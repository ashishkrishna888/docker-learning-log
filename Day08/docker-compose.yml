services:
  frontend:
    image: node:18-alpine
    container_name: frontend-app
    command: sh -c "echo Frontend Running && tail -f /dev/null"
    ports:
      - "3000:3000"
    depends_on:
      - backend

  backend:
    image: node:18-alpine
    container_name: backend-app
    command: sh -c "echo Backend Running && tail -f /dev/null"
    environment:
      DB_HOST: db
      DB_PORT: 5432
    depends_on:
      - db

  db:
    image: postgres:15
    container_name: postgres-db
    restart: always
    environment:
      POSTGRES_DB: mydb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
  db_data: